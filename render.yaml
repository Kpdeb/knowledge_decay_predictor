services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: knowdecay-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: knowdecay-db
          property: connectionString
      - key: ML_SERVICE_URL
        value: https://knowdecay-ml.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://knowdecay.vercel.app
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"

  # ── ML Service ───────────────────────────────────────────────────────────────
  - type: web
    name: knowdecay-ml
    env: python
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt && python training/train.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: ml-models
      mountPath: /app/models/saved
      sizeGB: 1

databases:
  - name: knowdecay-db
    databaseName: knowdecay
    user: knowdecay
    plan: free
